<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Payroll Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Extra styles just for the Admin Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: var(--input-bg); color: var(--text-muted); font-weight: 600; }
        .loading { text-align: center; color: var(--primary); font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <h1>Payroll Dashboard</h1>
        
        <div class="card">
            <h2>Global Settings</h2>
            <div class="input-group">
                <label style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; display: block;">Standard Daily Wage (₹)</label>
                <input type="number" id="base-wage" value="500" required>
            </div>
            <button id="btn-generate" class="btn primary">Fetch & Calculate Payroll</button>
        </div>

        <div class="card" id="report-card" style="display: none;">
            <h2>Salary Report</h2>
            <div id="status-text"></div>
            
            <table>
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Days Worked</th>
                        <th>Total Salary</th>
                    </tr>
                </thead>
                <tbody id="payroll-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbze49DgkDzFq7RF7XQpHzPMchMt_BAcxTQdiz_cW-sIM95nVElTdnSc36o-lqDr-S1E8w/exec";

        document.getElementById('btn-generate').addEventListener('click', async () => {
            const wage = parseFloat(document.getElementById('base-wage').value);
            const reportCard = document.getElementById('report-card');
            const tbody = document.getElementById('payroll-body');
            const statusText = document.getElementById('status-text');

            if (isNaN(wage) || wage <= 0) {
                alert("Please enter a valid daily wage.");
                return;
            }

            reportCard.style.display = 'block';
            statusText.innerHTML = '<div class="loading">Fetching live data from Google Sheets...</div>';
            tbody.innerHTML = ''; 

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const json = await response.json();

                if (json.result === 'success') {
                    const records = json.data;
                    const attendanceData = {};

                    // Process Data: Count only unique days for "Log In" events
                    records.forEach(row => {
                        if (row.Action === "Log In" && row.Name) {
                            const dateString = new Date(row.Timestamp).toLocaleDateString();
                            
                            if (!attendanceData[row.Name]) {
                                attendanceData[row.Name] = new Set();
                            }
                            attendanceData[row.Name].add(dateString);
                        }
                    });

                    // Render Data
                    statusText.innerHTML = ''; 
                    for (const [employeeName, datesSet] of Object.entries(attendanceData)) {
                        const daysWorked = datesSet.size;
                        const totalSalary = daysWorked * wage;

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="font-weight: 600; color: var(--text-main);">${employeeName}</td>
                            <td>${daysWorked} days</td>
                            <td style="color: var(--success); font-weight: bold;">₹${totalSalary.toLocaleString()}</td>
                        `;
                        tbody.appendChild(tr);
                    }

                    if (Object.keys(attendanceData).length === 0) {
                        statusText.innerHTML = '<p style="color: var(--text-muted);">No attendance records found yet.</p>';
                    }
                } else {
                    statusText.innerHTML = '<p style="color: var(--danger);">Error reading data from database.</p>';
                }
            } catch (error) {
                statusText.innerHTML = '<p style="color: var(--danger);">Network error. Please try again.</p>';
                console.error(error);
            }
        });
    </script>
</body>
</html>
