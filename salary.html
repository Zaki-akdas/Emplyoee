<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Estimator | Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Admin: Salary Setup</h1>
        
        <div class="card">
            <h2>Calculate Payout</h2>
            
            <div class="input-group">
                <label style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; display: block;">Employee Name</label>
                <input type="text" id="emp-name" placeholder="e.g. John Doe" required>
            </div>
            
            <div class="input-group">
                <label style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; display: block;">Daily Wage (₹)</label>
                <input type="number" id="daily-wage" placeholder="e.g. 500" required>
            </div>
            
            <div class="input-group">
                <label style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; display: block;">Total Days Worked</label>
                <input type="number" id="days-worked" placeholder="e.g. 22" required>
            </div>
            
            <button id="btn-calculate" class="btn primary">Calculate Total Salary</button>
        </div>

        <div class="card" id="result-card" style="display: none; background: #F0FDF4; border-color: #BBF7D0;">
            <h2 style="border-bottom: 2px solid #BBF7D0; color: #166534;">Final Payout Summary</h2>
            <p id="summary-name" style="font-weight: 600; margin-bottom: 15px; font-size: 1.1rem;"></p>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--text-muted);">
                <span>Daily Wage:</span>
                <span id="summary-wage"></span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--text-muted);">
                <span>Days Worked:</span>
                <span id="summary-days"></span>
            </div>
            
            <div style="display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #86EFAC; font-size: 1.3rem; color: var(--success); font-weight: 800;">
                <span>Total Salary:</span>
                <span id="summary-total"></span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('btn-calculate').addEventListener('click', () => {
            // Grab the values from the inputs
            const name = document.getElementById('emp-name').value.trim();
            const wage = parseFloat(document.getElementById('daily-wage').value);
            const days = parseFloat(document.getElementById('days-worked').value);

            // Validate that everything is filled out correctly
            if (!name || isNaN(wage) || isNaN(days)) {
                alert("Please fill in all fields with valid numbers.");
                return;
            }

            // The Math
            const total = wage * days;

            // Populate the Result Card
            document.getElementById('summary-name').innerText = `Employee: ${name}`;
            document.getElementById('summary-wage').innerText = `₹${wage.toLocaleString()}`;
            document.getElementById('summary-days').innerText = days;
            document.getElementById('summary-total').innerText = `₹${total.toLocaleString()}`;
            
            // Unhide the Result Card
            document.getElementById('result-card').style.display = 'block';
        });
    </script>
</body>
</html>
